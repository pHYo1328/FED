    <h1>Website Feedback</h1>
    <p>Use the form below to send us your comments or any problems your experienced while you are accessing my
        portfolio.</p><br /><br />
    <form>
        <fieldset>
            <label>I Have Feedback About:</label><br />
            <select>
                <option>Website Issues</option>
                <option>Slow Upload Speed</option>
                <option>Security Problems</option>
                <option>Unresponsive</option>
                <option>Others....</option>
            </select><br /><br />
            <label for="nAme">Name:</label><br>
            <input type="text" id="nAme" name="nAme" placeholder="Enter your name." required><br /><br />
            <label for="eMail">Email:</label><br />
            <input type="email" id="eMail" name="eMail" placeholder="Enter your Email." required><br /><br />
            <label for="sUbject">Subject:</label><br />
            <input type="text" id="sUbject" name="sUbject" placeholder="Please state your subject."
                required><br /><br />
            <label for="uRl">Page / Url:</label><br />
            <input type="url" id="uRl" name="uRl" placeholder="Please state Page name or Url of the Page."
                required><br /><br />
            <label for="dAte">Date:</label><br />
            <input type="date" id="dAte" name="dAte" required>
            <br /><br />
            <label for="telComm">Contect Number:</label><br />
            <input type="tel" id="telComm" name="telComm" placeholder="Please enter your Phone Number" required>
            <br /><br />
            <label for="cOmment">Comment:</label><br />
            <textarea rows="20" id="cOmment" name="cOmment"
                placeholder="Enter your comments for our website."></textarea><br /><br />
            <label for="rAnge">Rate My Website</label><br />
            0 <input type="range" id="rAnge" min="0" max="100"> 100 <br /><br />
            <button class="submit">Submit</button>
            <input type="reset" class="submit">
        </fieldset>

    </form>
